# Database settings (override with environment variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/personal}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings - creates/updates tables automatically
spring.jpa.hibernate.ddl-auto=update

server.port=${SERVER_PORT:8081}

# Clash of Clans API Token (override with environment variable)
coc.api.token=${COC_API_TOKEN:}
